benchmark: hotpotqa
metric: f1            # validation gate metric: "f1" or "em"
seed_skill: ""       # empty -> use the built-in generic seed skill

model:
  base_url: "http://localhost:8080/v1"   # local vLLM (docker-proxy maps host 8080 -> container 8000)
  api_key_env: "OPENAI_API_KEY"          # value is ignored by most local servers
  target_model: "qwen3.6-27b"     # served-model-name reported by the local vLLM server
  optimizer_model: "qwen3.6-27b"
  temperature: 0.0          # agent answers deterministically
  optimizer_temperature: 0.7
  max_tokens: 2048          # reasoning model: budget must cover thinking + answer
  optimizer_max_tokens: 4096   # reasoning model: thinking + revised skill
  timeout: 120.0
  max_retries: 4

train:
  num_epochs: 3
  batch_size: 8
  val_size: 50        # gate on this many val items per step (0 = all)
  workers: 8          # parallel rollout workers
  patience: 4         # early stop after N consecutive rejected edits
  min_improvement: 0.0
  seed: 0
